<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="BETA - OpenSearch Security Dashboard - Real-time security monitoring across SIEM, IDS/IPS, and EDR">
    <title>BETA - OpenSearch Security Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- D3.js for graph visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        /* Prevent flash of unstyled content */
        body {
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        body.loaded {
            opacity: 1;
        }
    </style>
</head>

<body>
    <!-- Navigation and main content will be injected by JavaScript -->

    <!-- JavaScript Modules -->
    <script src="js/opensearch-client.js"></script>
    <script src="js/data.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/correlation.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Show body once everything is loaded
        window.addEventListener('load', () => {
            document.body.classList.add('loaded');
        });

        // Handle page visibility changes for performance
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Pause animations or polling when tab is hidden
                console.log('Dashboard hidden - pausing updates');
            } else {
                // Resume when tab is visible
                console.log('Dashboard visible - resuming updates');
            }
        });
    </script>
</body>

</html>

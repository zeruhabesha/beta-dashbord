    }

    # Proxy Kubernetes API calls to a host-level kubectl proxy or API endpoint
    location /api/kubernetes/ {
        set $backend "http://host.docker.internal:8001";
        rewrite ^/api/kubernetes/?(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;

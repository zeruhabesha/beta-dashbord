input {
  kafka {
    bootstrap_servers => "carey-unpermeating-adena.ngrok-free.dev:443"
    topics => ["ids-events"]
    group_id => "logstash-ids-consumer"
    codec => "json"
    consumer_threads => 3
    decorate_events => true
    security_protocol => "SSL"
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }

  # Add index date for daily indices
  mutate {
    add_field => { "[@metadata][index_date]" => "%{+YYYY.MM.dd}" }
  }

  # Enrich with metadata
  mutate {
    add_field => {
      "data_source" => "kafka"
      "pipeline" => "ids"
    }
  }

  # Parse IDS-specific fields
  if [signature_id] {
    mutate {
      convert => { "signature_id" => "integer" }
    }
  }

  # Categorize attack types
  if [attack_type] {
    if [attack_type] =~ /(?i)sql/ {
      mutate { add_tag => ["sql_injection"] }
    } else if [attack_type] =~ /(?i)xss/ {
      mutate { add_tag => ["cross_site_scripting"] }
    } else if [attack_type] =~ /(?i)dos|ddos/ {
      mutate { add_tag => ["denial_of_service"] }
    }
  }
}

output {
  opensearch {
    hosts => ["http://opensearch-node1:9200"]
    index => "tenant_01_ids-%{[@metadata][index_date]}"
    document_id => "%{alert_id}"
  }

  # Debug output (optional, comment out in production)
  stdout {
    codec => rubydebug {
      metadata => true
    }
  }
}

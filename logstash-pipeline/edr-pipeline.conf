input {
  kafka {
    bootstrap_servers => "carey-unpermeating-adena.ngrok-free.dev:443"
    topics => ["edr-events"]
    group_id => "logstash-edr-consumer"
    codec => "json"
    consumer_threads => 3
    decorate_events => true
    security_protocol => "SSL"
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }

  # Add index date for daily indices
  mutate {
    add_field => { "[@metadata][index_date]" => "%{+YYYY.MM.dd}" }
  }

  # Enrich with metadata
  mutate {
    add_field => {
      "data_source" => "kafka"
      "pipeline" => "edr"
    }
  }

  # Parse EDR-specific fields
  if [process_id] {
    mutate {
      convert => { "process_id" => "integer" }
    }
  }

  # Categorize threat types
  if [threat_type] {
    if [threat_type] =~ /(?i)malware|virus|trojan/ {
      mutate { add_tag => ["malware"] }
    } else if [threat_type] =~ /(?i)ransomware/ {
      mutate { add_tag => ["ransomware"] }
    } else if [threat_type] =~ /(?i)suspicious/ {
      mutate { add_tag => ["suspicious_activity"] }
    }
  }

  # Parse file hash if present
  if [file_hash] {
    mutate {
      uppercase => [ "file_hash" ]
    }
  }
}

output {
  opensearch {
    hosts => ["http://opensearch-node1:9200"]
    index => "tenant_01_edr-%{[@metadata][index_date]}"
    document_id => "%{detection_id}"
  }

  # Debug output (optional, comment out in production)
  stdout {
    codec => rubydebug {
      metadata => true
    }
  }
}

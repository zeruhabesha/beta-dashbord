input {
  kafka {
    bootstrap_servers => "carey-unpermeating-adena.ngrok-free.dev:443"
    # Matches ALL tenant log topics regardless of who created them
    # e.g. acme-corp-log, bank-secure-log, ml-tenant-log, etc.
    topics_pattern => ".*-log$"
    group_id => "logstash-tenant-consumer"
    codec => "json"
    consumer_threads => 6
    decorate_events => true
    security_protocol => "SSL"
  }
}

filter {
  # Extract tenant ID from Kafka topic name
  # Topic format: <tenant-id>-log (e.g. "acme-corp-log" → "acme-corp")
  mutate {
    copy => { "[@metadata][kafka][topic]" => "[@metadata][kafka_topic]" }
  }

  ruby {
    code => '
      topic = event.get("[@metadata][kafka_topic]") || ""
      tenant_id = topic.gsub(/-log$/, "")
      event.set("tenant_id", tenant_id)
      event.set("[@metadata][tenant_id]", tenant_id)
    '
  }

  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Normalize timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }

  # Add index date for daily rollover
  mutate {
    add_field => {
      "[@metadata][index_date]" => "%{+YYYY.MM.dd}"
      "data_source"             => "kafka"
    }
  }

  # Normalize severity to numeric for consistent querying
  if [severity] {
    if      [severity] == "critical" { mutate { replace => { "severity_num" => 5 } } }
    else if [severity] == "high"     { mutate { replace => { "severity_num" => 4 } } }
    else if [severity] == "medium"   { mutate { replace => { "severity_num" => 3 } } }
    else if [severity] == "low"      { mutate { replace => { "severity_num" => 2 } } }
    else if [severity] == "info"     { mutate { replace => { "severity_num" => 1 } } }
  }

  # Tag attack types if present (IDS-type events)
  if [attack_type] {
    if      [attack_type] =~ /(?i)sql/      { mutate { add_tag => ["sql_injection"]        } }
    else if [attack_type] =~ /(?i)xss/      { mutate { add_tag => ["cross_site_scripting"] } }
    else if [attack_type] =~ /(?i)dos|ddos/ { mutate { add_tag => ["denial_of_service"]    } }
  }

  # Tag threat types if present (EDR-type events)
  if [threat_type] {
    if      [threat_type] =~ /(?i)malware|virus|trojan/ { mutate { add_tag => ["malware"]             } }
    else if [threat_type] =~ /(?i)ransomware/           { mutate { add_tag => ["ransomware"]           } }
    else if [threat_type] =~ /(?i)suspicious/           { mutate { add_tag => ["suspicious_activity"]  } }
  }

  # Uppercase file hashes for consistency
  if [file_hash] {
    mutate { uppercase => ["file_hash"] }
  }

  # Convert numeric fields
  if [signature_id] { mutate { convert => { "signature_id" => "integer" } } }
  if [process_id]   { mutate { convert => { "process_id"   => "integer" } } }
}

output {
  # Each tenant gets its own daily index automatically
  # Example outputs:
  #   acme-corp-logs-2026.03.13
  #   bank-secure-logs-2026.03.13
  #   ml-tenant-logs-2026.03.13
  opensearch {
    hosts => ["http://opensearch-node1:9200"]
    index => "%{[@metadata][tenant_id]}-logs-%{[@metadata][index_date]}"
  }

  # Debug (comment out in production)
  stdout {
    codec => rubydebug { metadata => true }
  }
}

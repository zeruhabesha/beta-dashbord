input {
  kafka {
    bootstrap_servers => "carey-unpermeating-adena.ngrok-free.dev:443"
    topics => ["siem-events"]
    group_id => "logstash-siem-consumer"
    codec => "json"
    consumer_threads => 3
    decorate_events => true
    security_protocol => "SSL"
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }

  # Add index date for daily indices
  mutate {
    add_field => { "[@metadata][index_date]" => "%{+YYYY.MM.dd}" }
  }

  # Enrich with metadata
  mutate {
    add_field => {
      "data_source" => "kafka"
      "pipeline" => "siem"
    }
  }

  # Parse severity to numeric if string
  if [severity] {
    if [severity] == "critical" {
      mutate { replace => { "severity_num" => 5 } }
    } else if [severity] == "high" {
      mutate { replace => { "severity_num" => 4 } }
    } else if [severity] == "medium" {
      mutate { replace => { "severity_num" => 3 } }
    } else if [severity] == "low" {
      mutate { replace => { "severity_num" => 2 } }
    } else if [severity] == "info" {
      mutate { replace => { "severity_num" => 1 } }
    }
  }
}

output {
  opensearch {
    hosts => ["http://opensearch-node1:9200"]
    index => "tenant_01_siem-%{[@metadata][index_date]}"
    document_id => "%{event_id}"
  }

  # Debug output (optional, comment out in production)
  stdout {
    codec => rubydebug {
      metadata => true
    }
  }
}

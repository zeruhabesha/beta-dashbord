services:
  # OpenSearch Services
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch-node1
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - opensearch-net

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://196.188.249.46:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    volumes:
      - opensearch-dashboards-data:/usr/share/opensearch-dashboards/data
      - ./opensearch-dashboards-config/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    depends_on:
      - opensearch
    networks:
      - opensearch-net

  # Kafka Ecosystem
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - opensearch-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - opensearch-net

  kafka-ui:
    build:
      context: ./kafka-ui-config
      dockerfile: Dockerfile
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    volumes:
      - ./kafka-ui-config/custom-theme.css:/app/static/custom-theme.css:ro
    environment:
      KAFKA_CLUSTERS_0_NAME: "BETA Security Platform"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - opensearch-net

  # ─── Vector (replaces Logstash) ─────────────────
  vector:
    image: timberio/vector:0.38.0-alpine
    container_name: vector
    depends_on:
      - opensearch
      - kafka
    ports:
      - "9598:9598"   # Prometheus metrics endpoint
    volumes:
      - ./vector-config/vector.toml:/etc/vector/vector.toml:ro
      - vector-data:/var/lib/vector
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      VECTOR_LOG: "info"
    networks:
      - opensearch-net
    restart: unless-stopped

  # ─── Security Dashboard (Web UI) ────────────────
  security-dashboard:
    build:
      context: ./beta-security-dashboard
    container_name: security-dashboard
    depends_on:
      - opensearch
      - dashboards
    ports:
      - "8080:80"
    networks:
      - opensearch-net
    environment:
      - VITE_OPENSEARCH_URL=
      - VITE_OPENSEARCH_DASHBOARDS_URL=
      - VITE_KAFKA_UI_URL=http://localhost:9090
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://host.docker.internal:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-master}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-security-admin-console}
      - KEYCLOAK_REDIRECT_URI=${KEYCLOAK_REDIRECT_URI:-}
      - KEYCLOAK_LOGOUT_REDIRECT_URI=${KEYCLOAK_LOGOUT_REDIRECT_URI:-}
      - OPENSEARCH_PROXY_TARGET=${OPENSEARCH_PROXY_TARGET:-http://196.188.249.46:9200}
      - DASHBOARDS_PROXY_TARGET=${DASHBOARDS_PROXY_TARGET:-http://196.188.249.46:5601}
      - DASHBOARDS_PROXY_PATH=${DASHBOARDS_PROXY_PATH:-}
      - KUBERNETES_PROXY_TARGET=${KUBERNETES_PROXY_TARGET:-http://host.docker.internal:8001}
      - KUBERNETES_PROXY_TOKEN=${KUBERNETES_PROXY_TOKEN:-}
      - KUBERNETES_PROXY_CA_DATA=${KUBERNETES_PROXY_CA_DATA:-}
      - KUBERNETES_PROXY_CLIENT_CERT_DATA=${KUBERNETES_PROXY_CLIENT_CERT_DATA:-}
      - KUBERNETES_PROXY_CLIENT_KEY_DATA=${KUBERNETES_PROXY_CLIENT_KEY_DATA:-}
    restart: unless-stopped

networks:
  opensearch-net:
    driver: bridge

volumes:
  opensearch-data:
  opensearch-dashboards-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  vector-data:
